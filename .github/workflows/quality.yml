name: 质量检查

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: 后端检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安装依赖
        working-directory: api
        run: uv sync --frozen
      - name: Ruff
        working-directory: api
        run: uv run ruff check .
      - name: 单元测试
        working-directory: api
        run: uv run pytest -m "not integration"

  frontend:
    name: 前端检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: 安装依赖
        working-directory: web
        run: npm ci
      - name: TypeScript 与生产构建
        working-directory: web
        run: npm run build

  integration:
    name: 迁移与集成检查
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: avpilot
          POSTGRES_PASSWORD: avpilot
          POSTGRES_DB: avpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U avpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: avpilot
      POSTGRES_PASSWORD: avpilot
      POSTGRES_DB: avpilot
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      DASHSCOPE_API_KEY: integration-placeholder
      RUN_INTEGRATION_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安装依赖
        working-directory: api
        run: uv sync --frozen
      - name: 验证迁移
        working-directory: api
        run: |
          uv run alembic upgrade head
          uv run alembic check
      - name: PostgreSQL 集成测试
        working-directory: api
        run: uv run pytest -m integration
      - name: Celery Redis 往返
        working-directory: api
        run: |
          uv run celery -A app.worker.celery_app worker -l WARNING -Q maintenance --pool=solo &
          worker_pid=$!
          trap 'kill "$worker_pid"' EXIT
          uv run python - <<'PY'
          import time
          from app.celery_app import celery_app

          deadline = time.time() + 20
          while time.time() < deadline:
              result = celery_app.send_task(
                  "app.tasks.maintenance.recover_stale_ingestions",
                  queue="maintenance",
              )
              try:
                  assert result.get(timeout=3) == 0
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("Celery worker did not complete the probe task")
          PY

  compose:
    name: Compose 配置
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 验证 Compose
        run: |
          cp .env.example .env
          docker compose config --quiet
