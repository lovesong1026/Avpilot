name: avpilot

x-worker-environment: &worker-environment
  POSTGRES_HOST: postgres
  ELASTICSEARCH_URL: http://elasticsearch:9200
  NEO4J_URI: bolt://neo4j:7687
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  STORAGE_PATH: /app/storage

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-avpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avpilot}
      POSTGRES_DB: ${POSTGRES_DB:-avpilot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avpilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    build: ./docker/elasticsearch
    image: avpilot-elasticsearch-ik:8.17.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "${ELASTICSEARCH_PORT:-19200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:9200 >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10

  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-avpilot-neo4j}
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: ./api
    env_file: .env
    environment: *worker-environment
    command:
      [
        "celery",
        "-A",
        "app.worker.celery_app",
        "worker",
        "-l",
        "INFO",
        "-Q",
        "ingestion,memory,maintenance",
        "--concurrency=2",
      ]
    volumes:
      - ./api/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: ./api
    env_file: .env
    environment: *worker-environment
    command:
      [
        "celery",
        "-A",
        "app.worker.celery_app",
        "beat",
        "-l",
        "INFO",
        "--schedule",
        "/app/beat-data/celerybeat-schedule",
      ]
    volumes:
      - beat_data:/app/beat-data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  elasticsearch_data:
  neo4j_data:
  redis_data:
  beat_data:
